<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      No Content-Security-Policy meta tag here. VS Code and JCEF inject
      their own CSP headers at runtime. A static CSP with 'self' breaks
      JCEF file:// loading (Chromium treats file:// self as null origin,
      blocking external module scripts).
    -->
    <title>Rubyn</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
