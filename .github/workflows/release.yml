name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webview-source/package-lock.json

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=384m"

      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: Rubyn-${{ steps.tag.outputs.version }}
          path: build/distributions/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Rubyn v${{ steps.tag.outputs.version }}"
          body: |
            ## Rubyn v${{ steps.tag.outputs.version }}

            ### Install from disk
            Download the `.zip` below → RubyMine → Settings → Plugins → ⚙️ → Install Plugin from Disk.
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: build/distributions/*.zip
